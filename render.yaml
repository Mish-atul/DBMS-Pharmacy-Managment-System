# Render Blueprint - Deploy both frontend and backend
# https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: pharmacy-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false  # You'll need to add this manually in Render dashboard
      - key: FRONTEND_URL
        fromService:
          name: pharmacy-frontend
          type: web
          property: host
    disk:
      name: pharmacy-data
      mountPath: /var/data
      sizeGB: 1

  # Frontend Static Site
  - type: web
    name: pharmacy-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
